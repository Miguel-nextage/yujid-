<style>
    /* Centraliza apenas o título principal */
    main h2 {
        text-align: center;
        width: 100%;
        margin-bottom: 40px;
    }

    /* Mantém o container de conteúdo alinhado à esquerda */
    main {
        display: flex;
        flex-direction: column;
        align-items: flex-start; 
        padding-left: 20px;
    }

    .contato-item {
        margin-bottom: 25px;
        text-align: left;
    }

    .contato-item p {
        margin: 0 0 8px 0;
        font-weight: bold;
    }

    /* Links brancos e sem sublinhado */
    main a {
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.1rem;
    }

    main a:hover {
        opacity: 0.8;
    }

    main i {
        font-size: 1.6rem;
    }
</style>
